<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<title>AI Security Gateway — Data Flow</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    * { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .label  { font-size:11px; fill:#888; }
    .title  { font-size:13px; font-weight:600; fill:#e2e0d8; }
    .sub    { font-size:11px; fill:#888; }
    .note   { font-size:11px; fill:#666; }
    rect    { stroke-width:0.5; }
    line, path { fill:none; }
    .arr { stroke:#555; stroke-width:0.8; fill:none; }
    .gray-box   { fill:#1c1c1e; stroke:#555; }
    .teal-box   { fill:#0a1f14; stroke:#1d9e75; }
    .coral-box  { fill:#2a1008; stroke:#c05030; }
    .purple-box { fill:#14112a; stroke:#6b5fd4; }
    .amber-box  { fill:#1e1408; stroke:#ba7517; }
    .red-badge  { fill:#2a0a0a; stroke:#a32d2d; }
    .red-text   { fill:#e24b4a; }
    .green-text { fill:#1d9e75; }
    .sep { stroke:#2a2a2a; stroke-width:0.5; fill:none; }
  </style>
</defs>

<text class="label" x="340" y="16" text-anchor="middle">user sends a message</text>

<rect x="220" y="24" width="240" height="44" rx="8" class="gray-box"/>
<text class="title" x="340" y="46" text-anchor="middle" dominant-baseline="central">User message</text>

<path d="M270 68 L110 106" class="arr" marker-end="url(#arrow)"/>
<path d="M340 68 L340 106" class="arr" marker-end="url(#arrow)"/>
<path d="M410 68 L570 106" class="arr" marker-end="url(#arrow)"/>

<text class="label" x="110" y="98" text-anchor="middle">Vulnerable</text>
<text class="label" x="340" y="98" text-anchor="middle">Secure</text>
<text class="label" x="570" y="98" text-anchor="middle">MCP Agent</text>

<rect x="30"  y="108" width="160" height="56" rx="8" class="coral-box"/>
<text class="title" x="110" y="130" text-anchor="middle" dominant-baseline="central">Llama 3.3</text>
<text class="sub"   x="110" y="148" text-anchor="middle" dominant-baseline="central">raw response</text>

<text class="note" x="110" y="186" text-anchor="middle">No guard</text>
<text class="note" x="110" y="202" text-anchor="middle">No tools</text>
<text class="note" x="110" y="218" text-anchor="middle">No MCP</text>

<rect x="258" y="108" width="164" height="56" rx="8" class="teal-box"/>
<text class="title" x="340" y="130" text-anchor="middle" dominant-baseline="central">Hybrid guard</text>
<text class="sub"   x="340" y="148" text-anchor="middle" dominant-baseline="central">rule + Nemotron</text>

<rect x="488" y="108" width="164" height="56" rx="8" class="teal-box"/>
<text class="title" x="570" y="130" text-anchor="middle" dominant-baseline="central">Hybrid guard</text>
<text class="sub"   x="570" y="148" text-anchor="middle" dominant-baseline="central">rule + Nemotron</text>

<path d="M340 164 L340 194" class="arr" marker-end="url(#arrow)"/>
<path d="M570 164 L570 194" class="arr" marker-end="url(#arrow)"/>

<rect x="294" y="176" width="64" height="24" rx="5" class="red-badge"/>
<text class="sub red-text" x="326" y="188" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600">BLOCK</text>

<rect x="524" y="176" width="64" height="24" rx="5" class="red-badge"/>
<text class="sub red-text" x="556" y="188" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600">BLOCK</text>

<rect x="258" y="198" width="164" height="56" rx="8" class="gray-box"/>
<text class="title" x="340" y="220" text-anchor="middle" dominant-baseline="central">Llama 3.3</text>
<text class="sub"   x="340" y="238" text-anchor="middle" dominant-baseline="central">chat, no tools</text>

<rect x="488" y="198" width="164" height="56" rx="8" class="purple-box"/>
<text class="title" x="570" y="220" text-anchor="middle" dominant-baseline="central">Claude Haiku</text>
<text class="sub"   x="570" y="238" text-anchor="middle" dominant-baseline="central">tool calling</text>

<text class="note" x="340" y="276" text-anchor="middle">MCP never reached</text>

<path d="M570 254 L570 294" class="arr" marker-end="url(#arrow)"/>
<text class="note" x="588" y="277" dominant-baseline="central">tool_call</text>

<rect x="488" y="296" width="164" height="56" rx="8" class="amber-box"/>
<text class="title" x="570" y="318" text-anchor="middle" dominant-baseline="central">MCP policy</text>
<text class="sub"   x="570" y="336" text-anchor="middle" dominant-baseline="central">intercepts tool calls</text>

<rect x="636" y="311" width="36" height="22" rx="4" class="red-badge"/>
<text class="sub red-text" x="654" y="322" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:600">BLOCK</text>

<path d="M570 352 L570 390" class="arr" marker-end="url(#arrow)"/>

<rect x="488" y="392" width="164" height="56" rx="8" class="gray-box"/>
<text class="title" x="570" y="414" text-anchor="middle" dominant-baseline="central">Filesystem server</text>
<text class="sub"   x="570" y="432" text-anchor="middle" dominant-baseline="central">stdio, local Mac</text>

<line x1="20" y1="496" x2="660" y2="496" class="sep"/>

<rect x="22" y="510" width="12" height="12" rx="2" style="fill:#0a1f14;stroke:#1d9e75;stroke-width:0.5"/>
<text class="sub" x="40" y="516" dominant-baseline="central">Guard layer (Secure + MCP Agent)</text>

<rect x="252" y="510" width="12" height="12" rx="2" style="fill:#14112a;stroke:#6b5fd4;stroke-width:0.5"/>
<text class="sub" x="270" y="516" dominant-baseline="central">MCP model (Claude Haiku only)</text>

<rect x="462" y="510" width="12" height="12" rx="2" style="fill:#1e1408;stroke:#ba7517;stroke-width:0.5"/>
<text class="sub" x="480" y="516" dominant-baseline="central">MCP policy layer</text>

<text class="sub red-text"   x="110" y="548" text-anchor="middle">no protection</text>
<text class="sub green-text" x="340" y="548" text-anchor="middle">prompt protected</text>
<text class="sub green-text" x="570" y="548" text-anchor="middle">prompt + execution protected</text>

</svg>
